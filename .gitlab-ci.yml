stages:
  - test
  - deploy

run-tests:
  stage: test
  only:
    - master
  tags:
    - linebot
  variables:
    GEMINI_API_KEY: "dummy-key-for-test"
  script:
    - bun install
    - bun test tests/
    
deploy-to-production:
  stage: deploy
  only:
    - master
  tags:
    - linebot
  script:
    - cd /var/www/jastel-app/line-ai-support
    - git fetch origin master
    - git reset --hard origin/master
    - docker network inspect jastel-network >/dev/null 2>&1 || docker network create jastel-network
    - docker compose up -d --build
    - docker image prune -f